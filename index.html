<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>NFC 自动视频</title>
    <style>
        body {
            margin: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        video {
            width: 90%;
            max-width: 900px;
            cursor: pointer;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            color: #fff;
            font-size: 16px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <video
        id="myVideo"
        src="video.mp4"
        autoplay
        muted
        playsinline
        loop
        controls
    ></video>

    <div class="hint">点击画面开启声音</div>

    <script>
        const video = document.getElementById('myVideo');

        // 用户第一次点击任意位置（包括视频）时开启声音
        document.body.addEventListener('click', () => {
            if (video.muted) {
                video.muted = false;
                video.play();
            }
        }, { once: true }); // 只执行一次
    </script>

</body>
</html>
